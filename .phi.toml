# Ag^id project policy for ag_phi_gamma (and any compatible analyser).
#
# Purpose: declare ag-id's structural identity so capability-based
# composite security rules (composite_backdoor, composite_exfiltration)
# do not produce false-positive activations when scanning a deterministic
# identifier protocol.
#
# This file is part of the ag-id source tree and intentionally narrow:
# it changes ONLY analyser interpretation, never code behaviour.
#
# Reviewers: this is NOT a way to silence the analyser. Every entry
# below is a positive declaration backed by source:
#
#   - The Rust files in src/ are cryptographic / encoding primitives
#     (BLAKE3 hash + hex/base58 codec), confirmed by:
#       * Cargo.toml dependencies (blake3 only; no I/O crates)
#       * #![cfg_attr(not(feature = "std"), no_std)] in src/lib.rs
#       * 0 unsafe, 0 std::fs, 0 std::net, 0 process spawn
#         (audited 2026-05-24 against ag_phi_gamma scan output)
#
#   - The encoding files participate in composite_backdoor /
#     composite_exfiltration capability shapes only because every
#     identifier protocol structurally combines:
#         encoded data  (hex / base58)
#         crypto hash   (BLAKE3)
#         domain-tagged input
#     This shape is the protocol, not an attack pattern.

[rules]
# Crypto / encoding primitive paths. Matched case-insensitive substring
# against the relative path of each scanned file.
#
# Scope rationale: the entire ag-id crate is a single crypto primitive —
# a domain-tagged BLAKE3 hash with an encoded display layer. Every file
# in src/, examples/, and benches/ is either the primitive itself or a
# direct demonstration of it. Tests are intentionally left out of this
# list so the analyser still observes them under default capability rules.
crypto_library_paths = [
    # Core primitive surface
    "src/derive.rs",    # Hashing + domain tagging (PREFIX = b"agid:v1:")
    "src/did.rs",       # Identifier struct + parsing
    "src/domain.rs",    # Domain enum and observation discipline
    "src/encode.rs",    # Hex / base58 codec
    "src/serde_impl.rs",# Serde adapter — pure type-shape translation
    "src/error.rs",     # Error enum — no behaviour
    "src/lib.rs",       # Crate root — module declarations only
    # Demonstration of the same primitive (no novel surface)
    "examples/basic.rs",
    "examples/parsing.rs",
    "benches/throughput.rs",
]
